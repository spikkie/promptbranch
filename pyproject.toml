[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "promptbranch"
version = "0.0.66"
description = "Stateful ChatGPT workflow CLI and reusable browser-automation service"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi",
  "httpx",
  "patchright",
  "playwright",
  "pydantic",
  "python-dotenv",
  "python-multipart",
  "uvicorn",
  "watchfiles",
]

[tool.setuptools]
py-modules = ["chatgpt_cli", "chatgpt_container_api", "chatgpt_service_client", "chatgpt_state"]

[tool.setuptools.packages.find]
include = ["chatgpt_automation*", "chatgpt_browser_auth*", "chatgpt_workflow*", "promptbranch*"]

[project.scripts]
promptbranch = "promptbranch.cli:main"
chatgpt = "chatgpt_workflow.cli:main"

[tool.setuptools.package-data]
chatgpt_workflow = ["completions/*"]
promptbranch = ["completions/*"]
