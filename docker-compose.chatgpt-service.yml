services:
  chatgpt-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: promptbranch-service:0.0.133
    init: true
    ports:
      - "8000:8000"
    environment:
      CHATGPT_UVICORN_APP: promptbranch_container_api:app
      CHATGPT_UVICORN_RELOAD: ${CHATGPT_UVICORN_RELOAD:-0}
      CHATGPT_PROJECT_URL: ${CHATGPT_PROJECT_URL:-https://chatgpt.com/}
      CHATGPT_EMAIL: ${CHATGPT_EMAIL:-}
      CHATGPT_PASSWORD_FILE: /run/secrets/chatgpt_password
      CHATGPT_HEADLESS: ${CHATGPT_HEADLESS:-0}
      CHATGPT_USE_PATCHRIGHT: ${CHATGPT_USE_PATCHRIGHT:-1}
      CHATGPT_BROWSER_CHANNEL: ${CHATGPT_BROWSER_CHANNEL:-chrome}
      CHATGPT_DISABLE_FEDCM: ${CHATGPT_DISABLE_FEDCM:-1}
      CHATGPT_FILTER_NO_SANDBOX: ${CHATGPT_FILTER_NO_SANDBOX:-0}
      CHATGPT_SERVICE_TOKEN: ${CHATGPT_SERVICE_TOKEN:-}
      CHATGPT_MAX_RETRIES: ${CHATGPT_MAX_RETRIES:-2}
      CHATGPT_RETRY_BACKOFF_SECONDS: ${CHATGPT_RETRY_BACKOFF_SECONDS:-2.0}
      CHATGPT_MIN_CONTEXT_SPACING_SECONDS: ${CHATGPT_MIN_CONTEXT_SPACING_SECONDS:-8.0}
      CHATGPT_CONVERSATION_HISTORY_RATE_LIMIT_COOLDOWN_SECONDS: ${CHATGPT_CONVERSATION_HISTORY_RATE_LIMIT_COOLDOWN_SECONDS:-120.0}
      CHATGPT_CLEAR_PROFILE_SINGLETON_LOCKS: ${CHATGPT_CLEAR_PROFILE_SINGLETON_LOCKS:-1}
    volumes:
      - ./.pb_profile:/app/.pb_profile
      - ./debug_artifacts:/app/debug_artifacts
    secrets:
      - chatgpt_password
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    develop:
      watch:
        - path: .
          action: sync
          target: /app
          initial_sync: true
          ignore:
            - .git/
            - .pytest_cache/
            - .venv/
            - __pycache__/
            - .pb_profile/
            - debug_artifacts/
            - uploaded_receipts*
            - '*.log'
            - '*.zip'
            - Dockerfile
            - docker-compose.chatgpt-service.yml
            - requirements.txt
            - pyproject.toml
            - docker/run-chatgpt-service-in-container.sh
        - path: docker/run-chatgpt-service-in-container.sh
          action: sync+restart
          target: /app/docker/run-chatgpt-service-in-container.sh
        - path: Dockerfile
          action: rebuild
        - path: requirements.txt
          action: rebuild
        - path: pyproject.toml
          action: rebuild

secrets:
  chatgpt_password:
    file: ${CHATGPT_PASSWORD_SECRET_FILE:-${HOME}/.config/chatgpt/password.txt}
